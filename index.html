<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лучшие школы Москвы 2025</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    .map-container { width: 100%; height: 100vh; }

    #legend {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      font-family: sans-serif;
      font-size: 12px;
      line-height: 1.8;
      z-index: 999;
    }
    #legend-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }
    #legend-header h4 { font-size: 13px; }
    #legend-toggle-btn {
      font-size: 11px;
      padding: 1px 6px;
      cursor: pointer;
      border: 1px solid #aaa;
      border-radius: 4px;
      background: #f5f5f5;
      white-space: nowrap;
    }
    #legend-toggle-btn:hover { background: #e8e8e8; }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      padding: 1px 0;
    }
    .legend-item:hover { opacity: 0.75; }
    .legend-item.disabled .legend-dot { opacity: 0.25; }
    .legend-item.disabled span { color: #aaa; text-decoration: line-through; }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.3);
    }

    .maplibregl-popup-close-button {
      font-size: 20px;
      width: 28px;
      height: 28px;
      line-height: 28px;
    }

    #status {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-family: sans-serif;
      font-size: 13px;
      z-index: 1000;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="map" class="map-container"></div>
  <div id="legend">
    <div id="legend-header">
      <h4>Группы школ (можно отщелкивать)</h4>
      <button id="legend-toggle-btn">скрыть</button>
    </div>
    <div id="legend-items"></div>
  </div>
  <div id="status">Загрузка...</div>

  <!-- Generated by scrape.js — run "node scrape.js" to regenerate -->
  <script src="data.js"></script>
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>

  <script>
    const status = document.getElementById('status');

    if (typeof window.SCHOOLS_DATA === 'undefined') {
      status.textContent = 'Ошибка: data.js не найден. Запустите "node scrape.js".';
      throw new Error('SCHOOLS_DATA not loaded');
    }

    const data = window.SCHOOLS_DATA;
    const groupById = Object.fromEntries(data.groups.map((g) => [g.id, g]));

    // Build legend
    const legendItems = document.getElementById('legend-items');
    const legendToggleBtn = document.getElementById('legend-toggle-btn');
    const activeGroups = new Set(data.groups.map((g) => g.id));

    function applyFilter() {
      if (!map.getLayer('schools-circles')) return;
      const ids = [...activeGroups];
      if (ids.length === data.groups.length) {
        map.setFilter('schools-circles', null);
      } else if (ids.length === 0) {
        map.setFilter('schools-circles', ['==', 'groupId', '']);
      } else {
        map.setFilter('schools-circles', ['in', ['get', 'groupId'], ['literal', ids]]);
      }
    }

    for (const group of data.groups) {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `
        <div class="legend-dot" style="background:${group.color}"></div>
        <span>${group.label}</span>`;
      item.addEventListener('click', () => {
        if (activeGroups.has(group.id)) {
          activeGroups.delete(group.id);
          item.classList.add('disabled');
        } else {
          activeGroups.add(group.id);
          item.classList.remove('disabled');
        }
        applyFilter();
      });
      legendItems.appendChild(item);
    }

    legendToggleBtn.addEventListener('click', () => {
      const hidden = legendItems.style.display === 'none';
      legendItems.style.display = hidden ? '' : 'none';
      legendToggleBtn.textContent = hidden ? 'скрыть' : 'показать';
    });

    // Build GeoJSON
    const geojsonFeatures = [];
    for (const school of data.schools) {
      const group = groupById[school.groupId];
      if (!group) continue;
      for (const building of school.buildings) {
        geojsonFeatures.push({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [building.lon, building.lat] },
          properties: {
            name: school.name,
            label: group.label,
            color: group.color,
            address: building.address,
            groupId: school.groupId,
          },
        });
      }
    }

    const map = new maplibregl.Map({
      container: 'map',
      center: [37.618, 55.751],
      zoom: 10,
      style: {
        version: 8,
        sources: {
          osm: {
            type: 'raster',
            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
            tileSize: 256,
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
          },
        },
        layers: [{ id: 'osm-tiles', type: 'raster', source: 'osm' }],
      },
    });

    map.on('load', () => {
      map.addSource('schools', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: geojsonFeatures },
      });

      map.addLayer({
        id: 'schools-circles',
        type: 'circle',
        source: 'schools',
        paint: {
          'circle-radius': 8,
          'circle-color': ['get', 'color'],
          'circle-stroke-width': 1,
          'circle-stroke-color': 'rgba(0,0,0,0.35)',
          'circle-opacity': 0.9,
        },
      });

      map.on('click', 'schools-circles', (e) => {
        const props = e.features[0].properties;
        new maplibregl.Popup()
          .setLngLat(e.features[0].geometry.coordinates)
          .setHTML(`
            <strong>${props.name}</strong><br>
            <span style="color:${props.color};font-weight:bold">${props.label}</span><br>
            ${props.address}
          `)
          .addTo(map);
      });

      map.on('mouseenter', 'schools-circles', () => {
        map.getCanvas().style.cursor = 'pointer';
      });
      map.on('mouseleave', 'schools-circles', () => {
        map.getCanvas().style.cursor = '';
      });

      let markerCount = geojsonFeatures.length;
      status.textContent = `${markerCount} зданий · ${data.schools.length} школ`;
      setTimeout(() => { status.style.display = 'none'; }, 4000);
    });
  </script>
</body>
</html>
