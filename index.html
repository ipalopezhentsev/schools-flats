<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лучшие школы Москвы 2025</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    .map-container { width: 100%; height: 100vh; }

    #legend {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      font-family: sans-serif;
      font-size: 12px;
      line-height: 1.8;
      z-index: 999;
    }
    #legend h4 { margin-bottom: 6px; font-size: 13px; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.3);
    }

    #status {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-family: sans-serif;
      font-size: 13px;
      z-index: 1000;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="map" class="map-container"></div>
  <div id="legend"><h4>Группы школ</h4></div>
  <div id="status">Загрузка...</div>

  <!-- Generated by scrape.js — run "node scrape.js" to regenerate -->
  <script src="data.js"></script>
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>

  <script>
    const status = document.getElementById('status');

    if (typeof window.SCHOOLS_DATA === 'undefined') {
      status.textContent = 'Ошибка: data.js не найден. Запустите "node scrape.js".';
      throw new Error('SCHOOLS_DATA not loaded');
    }

    const data = window.SCHOOLS_DATA;
    const groupById = Object.fromEntries(data.groups.map((g) => [g.id, g]));

    // Build legend
    const legend = document.getElementById('legend');
    for (const group of data.groups) {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `
        <div class="legend-dot" style="background:${group.color}"></div>
        <span>${group.label}</span>`;
      legend.appendChild(item);
    }

    // Build GeoJSON
    const geojsonFeatures = [];
    for (const school of data.schools) {
      const group = groupById[school.groupId];
      if (!group) continue;
      for (const building of school.buildings) {
        geojsonFeatures.push({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [building.lon, building.lat] },
          properties: {
            name: school.name,
            label: group.label,
            color: group.color,
            address: building.address,
          },
        });
      }
    }

    const map = new maplibregl.Map({
      container: 'map',
      center: [37.618, 55.751],
      zoom: 10,
      style: {
        version: 8,
        sources: {
          osm: {
            type: 'raster',
            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
            tileSize: 256,
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
          },
        },
        layers: [{ id: 'osm-tiles', type: 'raster', source: 'osm' }],
      },
    });

    map.on('load', () => {
      map.addSource('schools', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: geojsonFeatures },
      });

      map.addLayer({
        id: 'schools-circles',
        type: 'circle',
        source: 'schools',
        paint: {
          'circle-radius': 8,
          'circle-color': ['get', 'color'],
          'circle-stroke-width': 1,
          'circle-stroke-color': 'rgba(0,0,0,0.35)',
          'circle-opacity': 0.9,
        },
      });

      map.on('click', 'schools-circles', (e) => {
        const props = e.features[0].properties;
        new maplibregl.Popup()
          .setLngLat(e.features[0].geometry.coordinates)
          .setHTML(`
            <strong>${props.name}</strong><br>
            <span style="color:${props.color};font-weight:bold">${props.label}</span><br>
            ${props.address}
          `)
          .addTo(map);
      });

      map.on('mouseenter', 'schools-circles', () => {
        map.getCanvas().style.cursor = 'pointer';
      });
      map.on('mouseleave', 'schools-circles', () => {
        map.getCanvas().style.cursor = '';
      });

      let markerCount = geojsonFeatures.length;
      status.textContent = `${markerCount} зданий · ${data.schools.length} школ`;
      setTimeout(() => { status.style.display = 'none'; }, 4000);
    });
  </script>
</body>
</html>
